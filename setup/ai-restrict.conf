table inet ai_restrict {
    chain output {
        type filter hook output priority 0; policy accept;

        # Only apply to the ai user
        meta skuid != ai accept

        # Allow loopback
        oif lo accept

        # Allow established connections
        ct state established,related accept

        # Allow DNS
        udp dport 53 accept
        tcp dport 53 accept

        # Allow access to the local squid proxy
        tcp dport 3128 ip daddr 127.0.0.1 accept

        # Block direct HTTP/HTTPS (must go through proxy)
        tcp dport { 80, 443 } reject
    }
}
