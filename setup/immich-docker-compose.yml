# Immich — self-hosted Google Photos replacement
# Based on official compose from github.com/immich-app/immich
#
# Dedicated bridge network (same pattern as Authentik and Seafile).
# Only port 2283 is published to the host.
#
# Volume permissions (required on first deploy — needs root):
#   mkdir -p /hdd-almond-10tb/immich
#   chown -R 1000:1000 /hdd-almond-10tb/immich
#   mkdir -p /sharedfolders/compose-data/immich/postgres
#
# NPM proxy host: photos.tustin.house → http://127.0.0.1:2283
#   Enable "Websockets Support". SSL tab: select *.tustin.house wildcard cert.
#
# Generate a random DB password before first start:
#   openssl rand -base64 24 | tr -d '+/='
# Replace every YOUR_DB_PASSWORD below with the same value.
#
# Uploads live on the 10TB HDD (/hdd-almond-10tb/immich).
# PostgreSQL stays on NVMe for speed, so DB_STORAGE_TYPE=SSD.

services:

  # ── Immich Server ─────────────────────────────────────────────────────
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.6.1
    container_name: immich-server
    restart: always
    ports:
      - "2283:2283"
    volumes:
      - /hdd-almond-10tb/immich:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=YOUR_DB_PASSWORD
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      - REDIS_PORT=6379
      - TZ=America/Los_Angeles
    depends_on:
      - immich-redis
      - immich-postgres
    healthcheck:
      disable: false
    networks:
      - immich

  # ── Machine Learning ──────────────────────────────────────────────────
  # Runs on CPU (5800XT has no iGPU, no discrete GPU in this build).
  # ML tasks (face detection, CLIP encoding) work fine on 8c/16t, just slower.
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.6.1
    container_name: immich-machine-learning
    restart: always
    volumes:
      - model-cache:/cache
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=YOUR_DB_PASSWORD
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      - REDIS_PORT=6379
    healthcheck:
      disable: false
    networks:
      - immich

  # ── PostgreSQL (with vectorchord + pgvectors for vector search) ──────
  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_PASSWORD=YOUR_DB_PASSWORD
      - POSTGRES_USER=postgres
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
      - DB_STORAGE_TYPE=SSD
    volumes:
      - /sharedfolders/compose-data/immich/postgres:/var/lib/postgresql/data
    healthcheck:
      disable: false
    networks:
      - immich

  # ── Redis (Valkey) ────────────────────────────────────────────────────
  immich-redis:
    image: docker.io/valkey/valkey:9-alpine
    container_name: immich-redis
    restart: always
    healthcheck:
      test: valkey-cli ping || exit 1
    networks:
      - immich

volumes:
  model-cache:

networks:
  immich:
    name: immich
    driver: bridge
