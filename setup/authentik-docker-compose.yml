# All four containers share a bridge network so postgres and redis are never
# exposed on the host. Only port 9000 is published for NPM to reach.
# Do NOT use network_mode: host for postgres or redis — it would expose
# standard ports and conflict with other stacks (e.g. Seafile).
#
# Generate secret key: openssl rand -base64 36
# Same secret key must be used in both server and worker blocks.
#
# Volume permissions (required on first deploy):
#   chown -R 1000:1000 /sharedfolders/dev/compose/authentik/   # server & worker
#   chown -R 999:999 /sharedfolders/dev/compose/authentik/db   # postgres
#
# First-time setup: visit https://auth.tustin.house/if/flow/initial-setup/
# to create the admin account (one-time URL).

networks:
  authentik:
    driver: bridge

services:
  postgresql:
    image: postgres:16
    container_name: authentik-db
    networks:
      - authentik
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: YOUR_DB_PASSWORD
    volumes:
      - /sharedfolders/dev/compose/authentik/db:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: authentik-redis
    networks:
      - authentik
    restart: unless-stopped

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12.3
    container_name: authentik-server
    command: server
    networks:
      - authentik
    ports:
      - "9000:9000"
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: YOUR_DB_PASSWORD
      AUTHENTIK_SECRET_KEY: YOUR_LONG_RANDOM_SECRET
    volumes:
      - /sharedfolders/dev/compose/authentik/media:/media
      - /sharedfolders/dev/compose/authentik/templates:/templates
    restart: unless-stopped

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12.3
    container_name: authentik-worker
    command: worker
    networks:
      - authentik
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: YOUR_DB_PASSWORD
      AUTHENTIK_SECRET_KEY: YOUR_LONG_RANDOM_SECRET
    volumes:
      - /sharedfolders/dev/compose/authentik/media:/media
      - /sharedfolders/dev/compose/authentik/templates:/templates
    restart: unless-stopped
