# Nginx Proxy Manager — Advanced tab config for Seafile 13
#
# NPM proxy host settings (set in the UI):
#   Scheme: http  |  Forward Host: 127.0.0.1  |  Forward Port: 8080
#   Enable "Block Common Exploits" and "Websockets Support"
#   SSL tab: select your seafile.tustin.house certificate, force SSL
#
# Paste everything below into the Advanced tab.

# ── File server (uploads / downloads) ──────────────────────────────────
# Seafile's internal nginx already proxies /seafhttp to the Go file server,
# but we need unlimited body size and long timeouts for large file transfers.
location /seafhttp {
    proxy_pass http://127.0.0.1:8080/seafhttp;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 0;
    proxy_connect_timeout 36000s;
    proxy_read_timeout 36000s;
    proxy_send_timeout 36000s;
    send_timeout 36000s;
    proxy_request_buffering off;
}

# ── Notification server (WebSocket) ────────────────────────────────────
location /notification {
    proxy_pass http://127.0.0.1:8083/notification;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 86400s;
}

# ── WebDAV ─────────────────────────────────────────────────────────────
location /seafdav {
    proxy_pass http://127.0.0.1:8080/seafdav;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 0;
    proxy_connect_timeout 36000s;
    proxy_read_timeout 36000s;
    proxy_send_timeout 36000s;
    send_timeout 36000s;
}
