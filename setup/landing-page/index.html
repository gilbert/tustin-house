<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tustin.house</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      margin-bottom: 3rem;
      color: #fff;
    }

    .apps {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #c0c0c0;
      padding: 2rem 2.5rem;
      border-radius: 16px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      transition: all 0.2s ease;
      width: 200px;
    }

    .app:hover {
      background: #222;
      border-color: #444;
      transform: translateY(-4px);
      color: #fff;
    }

    .app svg {
      width: 72px;
      height: 72px;
      margin-bottom: 1.2rem;
    }

    .app span {
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* Jellyfin purple */
    .app.jellyfin:hover { border-color: #aa5cc3; }
    .app.jellyfin svg { color: #aa5cc3; }

    /* Seafile orange */
    .app.seafile:hover { border-color: #f38020; }
    .app.seafile svg { color: #f38020; }

    /* Immich blue */
    .app.immich:hover { border-color: #4250af; }
    .app.immich svg { color: #4250af; }

    /* FileRise green */
    .app.filerise:hover { border-color: #4caf50; }
    .app.filerise svg { color: #4caf50; }
  </style>
</head>
<body>
  <h1>tustin.house</h1>
  <div class="apps">

    <a href="https://watch.tustin.house" class="app jellyfin">
      <!-- Jellyfin logo -->
      <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M256 32C209.5 120.5 130.5 178 32 200c24 108 112 206 224 280 112-74 200-172 224-280C381.5 178 302.5 120.5 256 32z" fill="currentColor" opacity="0.3"/>
        <path d="M256 80c-34.5 70-95 114.5-172 132 20 88 90 168 172 228 82-60 152-140 172-228C351 196 290.5 150 256 80z" fill="currentColor" opacity="0.6"/>
        <path d="M256 140c-24 48-66 80-120 92 14 62 62 118 120 160 58-42 106-98 120-160-54-12-96-44-120-92z" fill="currentColor"/>
      </svg>
      <span>Watch Media</span>
    </a>

    <a href="https://seafile.tustin.house" class="app seafile">
      <!-- Seafile logo - stylized sail/wave -->
      <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M160 400 C160 400 180 160 260 80 C260 80 280 200 320 260 C360 320 400 340 400 340 L160 400z" fill="currentColor" opacity="0.8"/>
        <path d="M120 360 C120 360 200 340 280 300 C360 260 400 240 400 240" stroke="currentColor" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.5"/>
        <path d="M80 410 C80 410 180 380 280 350 C380 320 440 300 440 300" stroke="currentColor" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.3"/>
        <path d="M100 420 Q256 380 420 420" stroke="currentColor" stroke-width="28" stroke-linecap="round" fill="none"/>
      </svg>
      <span>Seafile</span>
    </a>

    <a href="https://upload.tustin.house" class="app filerise">
      <!-- Upload icon - arrow into tray -->
      <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M256 320 V120" stroke="currentColor" stroke-width="36" stroke-linecap="round"/>
        <path d="M176 200 L256 120 L336 200" stroke="currentColor" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M96 320 V380 C96 400 112 416 132 416 H380 C400 416 416 400 416 380 V320" stroke="currentColor" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span>Upload</span>
    </a>

    <a href="https://photos.tustin.house" class="app immich">
      <!-- Immich logo - stylized aperture/photo -->
      <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M256 96 L296 176 L384 176 L312 228 L336 316 L256 268 L176 316 L200 228 L128 176 L216 176 Z" fill="currentColor" opacity="0.15" transform="scale(1.3) translate(-50,-40)"/>
        <circle cx="256" cy="256" r="140" stroke="currentColor" stroke-width="28" fill="none" opacity="0.4"/>
        <circle cx="256" cy="256" r="70" stroke="currentColor" stroke-width="24" fill="none"/>
        <circle cx="256" cy="256" r="20" fill="currentColor"/>
        <path d="M256 88 V116" stroke="currentColor" stroke-width="20" stroke-linecap="round"/>
        <path d="M256 396 V424" stroke="currentColor" stroke-width="20" stroke-linecap="round"/>
        <path d="M88 256 H116" stroke="currentColor" stroke-width="20" stroke-linecap="round"/>
        <path d="M396 256 H424" stroke="currentColor" stroke-width="20" stroke-linecap="round"/>
      </svg>
      <span>Photos</span>
    </a>

  </div>
</body>
</html>
